<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#395886;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#638ECB;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main circle -->
  <circle cx="50" cy="50" r="48" fill="url(#grad1)"/>
  
  <!-- Inner accent circle -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="#8AAEE0" stroke-width="2" opacity="0.6"/>
  
  <!-- Letter K -->
  <text x="50" y="60" font-family="Arial, sans-serif" font-size="48" font-weight="bold" text-anchor="middle" fill="#F0F3FA">K</text>
</svg>